<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Một điều dành cho bạn</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
font-family:Arial;
overflow:hidden;
}

#gift{
font-size:120px;
cursor:pointer;
animation:shake 1s infinite;
}

@keyframes shake{
0%{transform:rotate(0)}
25%{transform:rotate(5deg)}
50%{transform:rotate(0)}
75%{transform:rotate(-5deg)}
100%{transform:rotate(0)}
}

#message{
display:none;
text-align:center;
color:white;
}

h1{
font-size:60px;
text-shadow:0 0 20px white,0 0 40px pink;
}

.heart{
position:absolute;
font-size:20px;
color:red;
animation:float 4s linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-100vh)}
}

.flower{
position:absolute;
font-size:24px;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh)}
}
</style>
</head>

<body>

<div id="gift">🎁</div>

<div id="message">
<h1>🌸Happy women’s day 🌸</h1>
<p> Chúc cậu một ngày 8/3 thật vui vẻ. Tớ mong cậu luôn xinh đẹp, hạnh phúc và gặp nhiều điều tốt đẹp. Cảm ơn vì cậu đã xuất hiện trong cuộc sống này.Hy vọng hôm nay sẽ là một ngày thật đặc biệt với cậu 💖 </p>
</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<script>

const gift = document.getElementById("gift")
const message = document.getElementById("message")
const music = document.getElementById("music")

gift.onclick = function(){
gift.style.display="none"
message.style.display="block"
music.play()
}

/* tim bay */
setInterval(()=>{
let h=document.createElement("div")
h.className="heart"
h.innerHTML="❤"
h.style.left=Math.random()*100+"vw"
document.body.appendChild(h)
setTimeout(()=>h.remove(),4000)
},300)

/* hoa rơi */
setInterval(()=>{
let f=document.createElement("div")
f.className="flower"
f.innerHTML="🌸"
f.style.left=Math.random()*100+"vw"
f.style.animationDuration=3+Math.random()*5+"s"
document.body.appendChild(f)
setTimeout(()=>f.remove(),8000)
},500)

</script>

</body>
</html>
